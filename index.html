<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Olivia’s Cozy Café</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* -------------------- COLORS -------------------- */
:root {
  --accent:#f4b27a;
  --soft:#f8d4a8;
  --cream:#fff3e0;
  --outline:#5b3a2a;
  --blush:#f7a6a6;
  --bg:#1a0f0a;
  --text:#fdf5e9;
  --muted:#e3d2c0;
}
body {
  margin:0;
  font-family:"Segoe UI",sans-serif;
  color:var(--text);
  background:#1a0f0a;
  overflow-x:hidden;
}

/* -------------------- BACKGROUND -------------------- */
.background {
  position:fixed; inset:0;
  background:url("https://img.magnific.com/premium-photo/serene-sunset-scene-featuring-sleeping-cat-balcony-surrounded-by-plants-books_1383414-2910.jpg?semt=ais_hybrid&w=740&q=80")
    center/cover no-repeat;
  filter:blur(2px) brightness(0.7);
  z-index:-2;
}
.overlay {
  position:fixed; inset:0;
  background:radial-gradient(circle at top,rgba(255,210,150,.35),transparent 55%),
             linear-gradient(to bottom,rgba(15,8,5,.7),rgba(10,5,3,.95));
  z-index:-1;
}
body.night .background { filter:blur(2px) brightness(0.4); }
body.night .overlay {
  background:radial-gradient(circle at top,rgba(120,160,255,.25),transparent 55%),
             linear-gradient(to bottom,rgba(5,8,20,.9),rgba(3,5,12,.98));
}

/* -------------------- LEAVES (SOFTER) -------------------- */
.leaf {
  position:fixed;
  width:6px; height:10px;
  background:rgba(255,200,140,.55);
  border-radius:50%;
  opacity:.5;
  animation:fall linear infinite;
  filter:blur(0.3px);
}
@keyframes fall {
  0% { transform:translateY(-10vh) translateX(0) rotate(0); }
  100% { transform:translateY(110vh) translateX(10px) rotate(120deg); }
}

/* -------------------- SPARKLES -------------------- */
.sparkle {
  position:fixed;
  width:4px; height:4px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 8px #fff;
  animation:spark 6s linear infinite;
}
@keyframes spark {
  0% { transform:translateY(100vh) scale(.4); opacity:0; }
  20% { opacity:1; }
  100% { transform:translateY(-10vh) scale(1); opacity:0; }
}

/* -------------------- LAYOUT -------------------- */
.container {
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}
.card {
  background:rgba(35,22,18,.9);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 18px 40px rgba(0,0,0,.55);
}
h1 { font-size:1.8rem; margin:0 0 10px; }
button {
  background:linear-gradient(135deg,#f7c08a,#f39b7a);
  border:none;
  border-radius:999px;
  padding:8px 16px;
  font-weight:600;
  color:#3b1f12;
  cursor:pointer;
}
button:hover { filter:brightness(1.1); }

/* -------------------- CORNER CATS (LOFI STYLE) -------------------- */
.cat {
  position:fixed;
  width:100px; height:100px;
  z-index:5;
  cursor:pointer;
}
.cat svg { width:100%; height:100%; }
.cat.left { bottom:10px; left:10px; }
.cat.right { bottom:10px; right:10px; }

.cat-body {
  transform-origin:50% 60%;
  animation:breath 4s ease-in-out infinite;
}
@keyframes breath {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.03); }
}

.cat.patting .cat-body {
  animation:pat 0.4s ease;
}
@keyframes pat {
  0% { transform:translateY(0) scale(1.03); }
  50% { transform:translateY(2px) scale(1.06); }
  100% { transform:translateY(0) scale(1.03); }
}

.cat-face {
  transition:transform 0.2s;
}
.cat.patting .cat-face {
  transform:translateY(-1px);
}

.toast {
  position:fixed;
  left:50%; bottom:80px;
  transform:translateX(-50%);
  background:rgba(25,15,10,.96);
  border-radius:999px;
  padding:8px 16px;
  font-size:.85rem;
  border:1px solid rgba(255,255,255,.18);
  opacity:0;
  transition:.25s;
}
.toast.show {
  opacity:1;
  transform:translateX(-50%) translateY(-4px);
}

/* -------------------- LINKS -------------------- */
.links a {
  display:inline-block;
  margin:4px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(30,18,12,.9);
  color:#ffd59b;
  text-decoration:none;
  font-size:.85rem;
}
.links a:hover {
  background:rgba(50,30,20,.95);
  color:#ffe9c7;
}

/* -------------------- TO‑DO LIST -------------------- */
.todo-item {
  display:flex;
  align-items:center;
  margin:6px 0;
}
.todo-item input[type="checkbox"] {
  width:18px; height:18px;
  margin-right:10px;
  accent-color:#f4b27a;
}
.todo-item input[type="text"] {
  flex:1;
  background:transparent;
  border:none;
  border-bottom:1px dashed rgba(255,255,255,.2);
  color:var(--text);
  font-size:1rem;
}
.todo-item input[type="text"]:focus {
  outline:none;
  border-bottom:1px solid var(--accent);
}
.delete-btn {
  margin-left:10px;
  cursor:pointer;
  color:#ffb3b3;
  font-size:1.2rem;
}

/* -------------------- MOOD NOTEBOOK -------------------- */
.mood-wrapper {
  display:flex;
  flex-direction:column;
  gap:12px;
}
.mood-today {
  background:rgba(50,30,20,.9);
  border-radius:14px;
  padding:12px;
}
.mood-today label {
  font-size:.9rem;
}
.mood-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:6px;
}
.mood-row select {
  background:rgba(20,10,5,.9);
  color:var(--text);
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
  padding:4px 10px;
}
.mood-row span.cups {
  font-size:1.1rem;
}
#moodNote {
  width:100%;
  min-height:60px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(20,10,5,.9);
  color:var(--text);
  padding:6px 8px;
  resize:vertical;
}

/* calendar notebook */
.mood-calendar {
  background:rgba(50,30,20,.9);
  border-radius:14px;
  padding:12px;
}
.mood-calendar h4 {
  margin:0 0 8px;
}
.calendar-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  font-size:.75rem;
}
.calendar-day-header {
  text-align:center;
  color:var(--muted);
}
.calendar-cell {
  height:40px;
  border-radius:8px;
  background:rgba(30,18,12,.9);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:1px solid transparent;
}
.calendar-cell.today {
  border-color:var(--accent);
}
.calendar-cell span.date {
  font-size:.7rem;
  color:var(--muted);
}
.calendar-cell span.coffee {
  font-size:1rem;
}

/* audio control hidden */
#lofiAudio, #meowAudio {
  display:none;
}
</style>
</head>

<body>
<div class="background"></div>
<div class="overlay"></div>

<!-- -------------------- CATS -------------------- -->
<div class="cat left" data-side="left">
  <svg viewBox="0 0 200 200">
    <!-- curled-up cat -->
    <g class="cat-body">
      <path fill="#b8793f" stroke="#5b3a2a" stroke-width="3"
        d="M60 120 Q40 100 45 80 Q50 55 75 45 Q100 35 125 45 Q150 55 155 80 Q160 100 145 120 Q130 140 100 145 Q70 140 60 120Z"/>
      <path fill="#d9b48a" stroke="#5b3a2a" stroke-width="2"
        d="M80 115 Q95 105 110 115 Q100 125 90 125 Q82 123 80 115Z"/>
      <!-- tail -->
      <path fill="#b8793f" stroke="#5b3a2a" stroke-width="3"
        d="M145 120 Q165 125 170 140 Q165 150 155 148 Q150 135 145 120Z"/>
      <!-- ears -->
      <path fill="#b8793f" stroke="#5b3a2a" stroke-width="3"
        d="M75 55 L70 35 L85 45Z"/>
      <path fill="#b8793f" stroke="#5b3a2a" stroke-width="3"
        d="M125 55 L130 35 L115 45Z"/>
    </g>
    <g class="cat-face">
      <!-- face area -->
      <circle cx="100" cy="85" r="22" fill="#d9b48a" stroke="#5b3a2a" stroke-width="3"/>
      <!-- sleepy eyes -->
      <path d="M90 82 Q95 86 100 82" stroke="#5b3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M100 82 Q105 86 110 82" stroke="#5b3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- tiny smile -->
      <path d="M95 90 Q100 93 105 90" stroke="#5b3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- blush -->
      <circle cx="88" cy="88" r="3" fill="#f7a6a6" opacity=".7"/>
      <circle cx="112" cy="88" r="3" fill="#f7a6a6" opacity=".7"/>
    </g>
  </svg>
</div>

<div class="cat right" data-side="right">
  <svg viewBox="0 0 200 200">
    <!-- side-sleeping cat -->
    <g class="cat-body">
      <path fill="#b8793f" stroke="#5b3a2a" stroke-width="3"
        d="M60 120 Q70 95 95 90 Q125 85 145 95 Q165 105 170 120 Q165 135 145 140 Q120 145 95 140 Q70 135 60 120Z"/>
      <!-- belly -->
      <path fill="#d9b48a" stroke="#5b3a2a" stroke-width="2"
        d="M80 118 Q95 110 120 115 Q110 130 95 132 Q85 130 80 118Z"/>
      <!-- tail -->
      <path fill="#b8793f" stroke="#5b3a2a" stroke-width="3"
        d="M170 120 Q185 125 188 138 Q182 148 172 146 Q170 138 170 120Z"/>
      <!-- ears (side) -->
      <path fill="#b8793f" stroke="#5b3a2a" stroke-width="3"
        d="M80 90 L75 70 L90 80Z"/>
    </g>
    <g class="cat-face">
      <!-- side face -->
      <ellipse cx="105" cy="100" rx="18" ry="16" fill="#d9b48a" stroke="#5b3a2a" stroke-width="3"/>
      <!-- sleepy eye -->
      <path d="M100 98 Q105 102 110 98" stroke="#5b3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- tiny smile -->
      <path d="M102 105 Q107 108 112 105" stroke="#5b3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- blush -->
      <circle cx="96" cy="103" r="3" fill="#f7a6a6" opacity=".7"/>
    </g>
  </svg>
</div>

<audio id="meowAudio">
  <source src="https://actions.google.com/sounds/v1/animals/cat_meow.ogg" type="audio/ogg">
</audio>
<audio id="lofiAudio" loop>
  <source src="https://files.catbox.moe/1x9j8p.mp3" type="audio/mp3">
</audio>

<div class="toast" id="toast"></div>

<!-- -------------------- CONTENT -------------------- -->
<div class="container">

  <div class="card">
    <h1>Olivia’s Cozy Café ☕🐈</h1>
    <p>Welcome to your warm digital nook — sip, breathe, and relax.</p>
    <button id="magic">✨ Magic Mood Button</button>
  </div>

  <div class="card" id="calendar">
    <h3>Today</h3>
    <div id="date"></div>
    <div id="time"></div>
  </div>

  <div class="card" id="quote">
    <h3>Daily Cozy Quote</h3>
    <p id="quoteText"></p>
  </div>

  <div class="card links">
    <h3>Café Links</h3>
    <a href="https://www.google.com" target="_blank">🔍 Google</a>
    <a href="https://music.youtube.com" target="_blank">🎧 YouTube Music</a>
    <a href="https://www.pinterest.com" target="_blank">📌 Pinterest</a>
    <a href="https://mail.google.com" target="_blank">✉️ Gmail</a>
  </div>

  <div class="card">
    <h3>To‑Do List</h3>
    <div id="todoList"></div>
    <button id="addTask">➕ Add Task</button>
  </div>

  <div class="card">
    <h3>☕ Mood Notebook</h3>
    <div class="mood-wrapper">
      <div class="mood-today">
        <strong>Today’s Coffee Mood</strong>
        <div class="mood-row">
          <label for="moodLevel">Mood level:</label>
          <select id="moodLevel">
            <option value="0">0 ☕ (empty cup)</option>
            <option value="1">1 ☕</option>
            <option value="2">2 ☕☕</option>
            <option value="3">3 ☕☕☕</option>
            <option value="4">4 ☕☕☕☕</option>
            <option value="5">5 ☕☕☕☕☕</option>
          </select>
          <span class="cups" id="moodCups">☕</span>
        </div>
        <textarea id="moodNote" placeholder="Little note about how you’re feeling today..."></textarea>
        <button id="saveMood">Save today’s mood</button>
      </div>

      <div class="mood-calendar">
        <h4>Coffee Mood Calendar</h4>
        <div id="calendarMonth"></div>
        <div class="calendar-grid" id="moodCalendarGrid"></div>
      </div>
    </div>
  </div>

</div>

<script>
/* -------------------- LEAVES -------------------- */
for(let i=0;i<10;i++){
  const l=document.createElement("div");
  l.className="leaf";
  l.style.left=Math.random()*100+"vw";
  l.style.animationDuration=10+Math.random()*8+"s";
  l.style.animationDelay=Math.random()*6+"s";
  document.body.appendChild(l);
}

/* -------------------- SPARKLES -------------------- */
for(let i=0;i<18;i++){
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDelay=Math.random()*6+"s";
  s.style.animationDuration=5+Math.random()*6+"s";
  document.body.appendChild(s);
}

/* -------------------- DATE + TIME -------------------- */
function updateTime(){
  const n=new Date();
  document.getElementById("date").textContent =
    n.toLocaleDateString(undefined,{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  document.getElementById("time").textContent =
    n.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

/* -------------------- QUOTES -------------------- */
const quotes=[
  "Take a deep breath — you’re doing beautifully.",
  "Small steps still move you forward.",
  "You deserve soft moments and warm light.",
  "Rest is productive too.",
  "You are allowed to take up space.",
  "Your story is still unfolding — gently."
];
document.getElementById("quoteText").textContent =
  quotes[new Date().getDate() % quotes.length];

/* -------------------- MAGIC BUTTON -------------------- */
document.getElementById("magic").onclick=()=>{
  document.body.classList.toggle("night");
};

/* -------------------- CAT INTERACTION -------------------- */
const toastEl=document.getElementById("toast");
const meowAudio=document.getElementById("meowAudio");
let lofiStarted=false;
const lofiAudio=document.getElementById("lofiAudio");

function showToast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add("show");
  setTimeout(()=>toastEl.classList.remove("show"),1500);
}

document.querySelectorAll(".cat").forEach(cat=>{
  cat.addEventListener("click",()=>{
    cat.classList.add("patting");
    setTimeout(()=>cat.classList.remove("patting"),400);
    try { meowAudio.currentTime=0; meowAudio.play(); } catch(e){}
    showToast("The cat purrs and meows softly...");
  });
});

/* start lofi after first click anywhere */
document.addEventListener("click",()=>{
  if(!lofiStarted){
    lofiStarted=true;
    try { lofiAudio.volume=0.6; lofiAudio.play(); } catch(e){}
  }
},{once:true});

/* -------------------- TO‑DO LIST -------------------- */
let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

function saveTasks(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
}

function renderTasks(){
  const list=document.getElementById("todoList");
  list.innerHTML="";
  tasks.forEach((task,i)=>{
    const row=document.createElement("div");
    row.className="todo-item";

    const box=document.createElement("input");
    box.type="checkbox";
    box.checked=task.done;
    box.onchange=()=>{
      tasks[i].done=box.checked;
      saveTasks();
    };

    const text=document.createElement("input");
    text.type="text";
    text.value=task.text;
    text.oninput=()=>{
      tasks[i].text=text.value;
      saveTasks();
    };

    const del=document.createElement("span");
    del.className="delete-btn";
    del.innerHTML="✖";
    del.onclick=()=>{
      tasks.splice(i,1);
      saveTasks();
      renderTasks();
    };

    row.appendChild(box);
    row.appendChild(text);
    row.appendChild(del);
    list.appendChild(row);
  });
}

document.getElementById("addTask").onclick=()=>{
  tasks.push({text:"New task",done:false});
  saveTasks();
  renderTasks();
};

renderTasks();

/* -------------------- MOOD NOTEBOOK -------------------- */
const moodLevelEl=document.getElementById("moodLevel");
const moodCupsEl=document.getElementById("moodCups");
const moodNoteEl=document.getElementById("moodNote");
const saveMoodBtn=document.getElementById("saveMood");
const calendarGrid=document.getElementById("moodCalendarGrid");
const calendarMonthEl=document.getElementById("calendarMonth");

function cupsFromLevel(level){
  const n=parseInt(level,10)||0;
  if(n<=0) return "☕";
  return "☕".repeat(Math.min(n,5));
}

moodLevelEl.addEventListener("change",()=>{
  moodCupsEl.textContent=cupsFromLevel(moodLevelEl.value);
});

/* key per day: YYYY-MM-DD */
function todayKey(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}

function loadMoodForToday(){
  const all=JSON.parse(localStorage.getItem("moods") || "{}");
  const key=todayKey();
  const entry=all[key];
  if(entry){
    moodLevelEl.value=entry.level;
    moodCupsEl.textContent=cupsFromLevel(entry.level);
    moodNoteEl.value=entry.note||"";
  } else {
    moodLevelEl.value="0";
    moodCupsEl.textContent=cupsFromLevel(0);
    moodNoteEl.value="";
  }
}

saveMoodBtn.addEventListener("click",()=>{
  const all=JSON.parse(localStorage.getItem("moods") || "{}");
  const key=todayKey();
  all[key]={
    level:moodLevelEl.value,
    note:moodNoteEl.value
  };
  localStorage.setItem("moods",JSON.stringify(all));
  buildMoodCalendar();
  showToast("Saved today’s coffee mood ☕");
});

/* build calendar for current month */
function buildMoodCalendar(){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth(); // 0-based
  const first=new Date(year,month,1);
  const startDay=first.getDay(); // 0=Sun
  const daysInMonth=new Date(year,month+1,0).getDate();
  const moods=JSON.parse(localStorage.getItem("moods") || "{}");

  calendarMonthEl.textContent=now.toLocaleDateString(undefined,{month:"long",year:"numeric"});

  calendarGrid.innerHTML="";
  const dayNames=["S","M","T","W","T","F","S"];
  dayNames.forEach(d=>{
    const h=document.createElement("div");
    h.className="calendar-day-header";
    h.textContent=d;
    calendarGrid.appendChild(h);
  });

  for(let i=0;i<startDay;i++){
    const empty=document.createElement("div");
    calendarGrid.appendChild(empty);
  }

  const todayKeyStr=todayKey();

  for(let day=1;day<=daysInMonth;day++){
    const cell=document.createElement("div");
    cell.className="calendar-cell";
    const dateObj=new Date(year,month,day);
    const key=dateObj.toISOString().slice(0,10);
    if(key===todayKeyStr) cell.classList.add("today");

    const dateSpan=document.createElement("span");
    dateSpan.className="date";
    dateSpan.textContent=day;

    const coffeeSpan=document.createElement("span");
    coffeeSpan.className="coffee";
    const entry=moods[key];
    coffeeSpan.textContent=entry ? cupsFromLevel(entry.level) : "☕";

    cell.appendChild(dateSpan);
    cell.appendChild(coffeeSpan);

    cell.addEventListener("click",()=>{
      const entry2=moods[key];
      if(entry2){
        alert(key + "\nMood: " + cupsFromLevel(entry2.level) + "\n\nNote:\n" + (entry2.note||"(no note)"));
      } else {
        alert(key + "\nNo mood saved yet for this day.");
      }
    });

    calendarGrid.appendChild(cell);
  }
}

loadMoodForToday();
buildMoodCalendar();
</script>

</body>
</html>
